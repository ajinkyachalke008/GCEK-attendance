<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GCEK SmartCampus - QR Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
        @keyframes scan {
            0% { top: 0%; opacity: 0.5; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0.5; }
        }
        .scanner-line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #0056b3, transparent);
            position: absolute;
            width: 100%;
            z-index: 20;
            animation: scan 3s ease-in-out infinite;
            box-shadow: 0 0 15px 2px rgba(0, 86, 179, 0.4);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glow-soft { box-shadow: 0 0 20px rgba(0, 86, 179, 0.08); }
        .scanner-glow { box-shadow: inset 0 0 30px rgba(0, 86, 179, 0.05), 0 0 40px rgba(0, 86, 179, 0.1); }
</style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0056b3",
                "primary-dark": "#003d7a",
                "secondary": "#f8f9fa",
                "accent": "#ffc107",
                "surface": "#ffffff",
                "surface-variant": "#f1f5f9",
                "on-surface": "#1e293b",
                "on-surface-variant": "#64748b",
                "outline": "#cbd5e1",
              },
              fontFamily: {
                "headline": ["Space Grotesk", "sans-serif"],
                "body": ["Inter", "sans-serif"],
              },
            },
          },
        }
</script>
<script>
    // Mock QR Scanner functionality
    function startScan() {
        const statusEl = document.getElementById('scan-status');
        const statusText = document.getElementById('scan-text');
        statusEl.classList.remove('bg-primary');
        statusEl.classList.add('bg-green-500');
        statusText.innerText = "AUTHENTICATED";
        statusText.classList.remove('text-primary');
        statusText.classList.add('text-white');
        
        // redirect after 2s
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2000);
    }
</script>
</head>
<body class="bg-slate-50 text-on-surface font-body selection:bg-primary/10 min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white/90 backdrop-blur-md border-b border-slate-200">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-headline font-bold text-lg">G</div>
<div class="flex flex-col">
<h1 class="font-headline font-bold text-lg leading-tight text-primary">GCEK Karad</h1>
<span class="text-[10px] uppercase tracking-wider font-semibold text-on-surface-variant">SmartCampus Scanner</span>
</div>
</div>
</header>
<!-- Main Scanner Content -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-32">
<div class="text-center mb-10">
<h2 class="text-3xl font-headline font-bold text-slate-900 tracking-tight">QR Scanner</h2>
<p class="text-on-surface-variant text-sm mt-3 max-w-[280px] mx-auto leading-relaxed">Place the campus ID card or document QR code within the frame to authenticate.</p>
</div>
<div class="relative w-72 h-72 md:w-80 md:h-80 scanner-glow rounded-2xl transition-all duration-700 cursor-pointer" onclick="startScan()">
<div class="absolute inset-0 rounded-2xl bg-white border border-slate-200 overflow-hidden">
<div class="scanner-line"></div>
<div class="absolute inset-0 flex items-center justify-center opacity-5">
<div class="w-full h-[1px] bg-primary"></div>
<div class="h-full w-[1px] bg-primary"></div>
</div>
</div>
<div class="absolute -top-2 -left-2 w-12 h-12 border-t-4 border-l-4 border-primary rounded-tl-xl drop-shadow-[0_0_8px_rgba(0,86,179,0.3)]"></div>
<div class="absolute -top-2 -right-2 w-12 h-12 border-t-4 border-r-4 border-primary rounded-tr-xl drop-shadow-[0_0_8px_rgba(0,86,179,0.3)]"></div>
<div class="absolute -bottom-2 -left-2 w-12 h-12 border-b-4 border-l-4 border-primary rounded-bl-xl drop-shadow-[0_0_8px_rgba(0,86,179,0.3)]"></div>
<div class="absolute -bottom-2 -right-2 w-12 h-12 border-b-4 border-r-4 border-primary rounded-br-xl drop-shadow-[0_0_8px_rgba(0,86,179,0.3)]"></div>
</div>
<div class="mt-14 w-full max-w-sm px-4">
<p class="text-xs text-center text-slate-400 mb-6">Click the frame above to simulate scan.</p>
<div class="flex items-center justify-center gap-3 px-6 py-3.5 rounded-full bg-white border border-slate-100 shadow-sm mx-auto w-fit transition-colors" id="scan-status-container">
<span class="relative flex h-2.5 w-2.5">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-40"></span>
<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-primary" id="scan-status"></span>
</span>
<span class="text-xs font-bold text-primary uppercase tracking-[0.1em]" id="scan-text">System Ready</span>
</div>
</div>
</main>
<!-- Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-50 flex justify-around items-center h-16 bg-white/95 backdrop-blur-md border-t border-slate-200">
  <a class="flex flex-col items-center justify-center w-full text-slate-400 hover:text-primary transition-colors" href="index.html">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-bold mt-1">Home</span>
  </a>
  <a class="flex flex-col items-center justify-center w-full text-primary" href="scanner.html">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
    <span class="text-[10px] font-bold mt-1">Scan</span>
  </a>
  <a class="flex flex-col items-center justify-center w-full text-slate-400 hover:text-primary transition-colors" href="classes.html">
    <span class="material-symbols-outlined">menu_book</span>
    <span class="text-[10px] font-bold mt-1">Classes</span>
  </a>
  <a class="flex flex-col items-center justify-center w-full text-slate-400 hover:text-primary transition-colors" href="analytics.html">
    <span class="material-symbols-outlined">leaderboard</span>
    <span class="text-[10px] font-bold mt-1">Analytics</span>
  </a>
  <a class="flex flex-col items-center justify-center w-full text-slate-400 hover:text-primary transition-colors" href="teacher.html">
    <span class="material-symbols-outlined">person</span>
    <span class="text-[10px] font-bold mt-1">Faculty</span>
  </a>
</nav>
</body></html>
